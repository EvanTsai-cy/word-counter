<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字數計算器 | Word Counter</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <section class="card">

      <div class="header">

        <div class="title-wrap">
          <h1 class="title">字數計算器</h1>

          <p class="subtitle">
            輸入或貼上文字後，即時計算總字元數、不含空白字元、英文單字、中文字數與行數。
          </p>
        </div>

        <button id="themeToggle" class="theme-btn">
          切換深色模式
        </button>

      </div>


      <textarea
        id="textInput"
        class="text-area"
        placeholder="請輸入文字..."
      ></textarea>


      <div class="stats">

        <div class="stat-card">
          <div class="stat-label">總字元數（含空白）</div>
          <div class="stat-value" id="charCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">不含空白字元數</div>
          <div class="stat-value" id="charNoSpaceCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">英文單字數</div>
          <div class="stat-value" id="englishWordCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">中文字數</div>
          <div class="stat-value" id="chineseCharCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">行數</div>
          <div class="stat-value" id="lineCount">0</div>
        </div>

      </div>


      <div class="actions">

        <button id="clearBtn" class="primary-btn">
          清空文字
        </button>

        <button id="copyBtn" class="secondary-btn">
          複製文字
        </button>

      </div>


      <p class="footer-note">
        支援中英文混合內容的基本字數統計。
      </p>

    </section>

  </main>


  <script src="script.js"></script>

</body>
</html>
